<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebMetaWave | Unauthorized</title>
  <link rel="stylesheet" th:href="@{/style/Unauthorized.css}">
</head>
<body>
<main class="card">
  <div class="badge">WEBMETAWAVE</div>
  <h1>You are not logged in</h1>
  <p>
    Please log in to access secure wallet pages.
    If you don't have an account yet, register.
  </p>

  <div class="actions">
    <a class="button button-primary" th:href="@{/login}">Login</a>
    <a class="button button-secondary" th:href="@{/register}">Register</a>
  </div>
</main>
</body>
</html>
